{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>InfinitFolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'imgs/infinitfolio.png' %}" type="image/png">
    <style>
        /* General styles */
        html, body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212; /* Dark background */
            color: #e0e0e0; /* Light text */
        }
	a{
		text-decoration : none;
	}
        /* Brand styling */
        .brand {
            width: 100%;
            position: fixed;
            z-index: 1;
            background: rgba(0, 133, 249, 0.3); /* Light background for brand */
            backdrop-filter: blur(5px);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
	     top:0
        }

        .brand-container {
            width: 250px;
            display: flex;
            margin: 10px auto;
            justify-content: center;
            align-items: center;
        }

        .brand img {
            border-radius: 10px;
            margin-right: 10px;
        }

        /* Product grid styling */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* Adjusted min size */
            gap: 20px;
            margin: 50px 20px; /* Added margin */
            margin-top: 200px; /* Adjusted to avoid overlap with the fixed header */
        }

        .product-grid-item {
            background-color: #1e1e1e; /* Dark product card */
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .product-grid-item:hover {
            transform: scale(1.05); /* Scale effect on hover */
        }

        .product-grid-item img {
            max-width: 100%;
            height: 200px; /* Set a consistent height */
            object-fit: cover; /* Ensures images cover the box without distortion */
        }

        .product-grid-item h3 {
            margin: 0;
            padding: 10px;
            font-size: 20px; /* Slightly smaller font for consistency */
            font-weight: bold;
            color: #00e350; /* Green color for titles */
        }

        /* Button styling */
        .start {
            border: none;
            background: white;
            box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
            font-size: 20px; /* Adjusted size for consistency */
            border-radius: 10px;
            color: purple;
            margin: 10px; /* Margin for spacing */
            padding: 10px 20px; /* Padding for better appearance */
            cursor: pointer;
            transition: all .3s ease-in-out;
        }

        .start:hover {
            background: purple;
            color: white;
        }

        /* Responsive adjustments for the button */
        @media screen and (max-width: 500px) {
            .start {
                font-size: 16px; /* Adjusted size for smaller screens */
            }
            .cover-image {
                background-position: right;
            }
        }
    </style>
</head>
<body>
    <div class="brand">
        <div class="brand-container">
            <img src="{% static 'imgs/infinitfolio.png' %}" width="50" height="50">
            <h2>INFINITFOLIO</h2>
        </div>
    </div>
    <div class="product-grid">
        <a href="/blogs/create">
            <div class="product-grid-item">
                <img src="{% static 'imgs/blog.jpg' %}" alt="Create Blog">
                <h3>Create Blog</h3>
            </div>
        </a>
        <a href="/stores/create">
            <div class="product-grid-item">
                <img src="{% static 'imgs/e-shop.jpg' %}" alt="Create E-shop">
                <h3>Create E-shop</h3>
            </div>
        </a>
        <a href="/mymenus">
            <div class="product-grid-item">
                <img src="{% static 'imgs/menu.jpg' %}" alt="Menu">
                <h3>Menu</h3>
            </div>
        </a>
        <a href="/create">
            <div class="product-grid-item">
                <img src="{% static 'imgs/portfolio.png' %}" alt="Create Portfolio">
                <h3>Create Portfolio</h3>
            </div>
        </a>
    </div>
</body>
</html>
