{%load static%}
<!DOCTYPE html>
<html>
  <head>
    <title>infinitfolio</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="{%static 'imgs/infinitfolio.png' %}" type="image/png">
    <style>
      /* Styling for cover image */
      .cover-image {
        background-image: url("{%static 'imgs/cover_img.gif' %}");
        height: 500px;
        background-size: cover;
        background-position: center;
        position: relative;
      }
      html, body{
        margin:0;
        padding:0;
      }
      a{
        text-decoration:none;
        color:#000;
      }
      .brand{
        width:100%;
        position:fixed;
        z-index:1;
      }
      .brand-container{
        width:250px;
        display:flex;
        margin:0 auto;
        justify-content:center;
        background:#0085f93d;
        border-bottom-left-radius:10px;
        border-bottom-right-radius:10px;
      }
      /* Styling for product grid */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        grid-gap: 20px;
        margin: 50px 0;
      }
      .product-grid-item {
        background-color: #fff;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        overflow: hidden;
		text-align: center;
		cursor:pointer;
      }
      .product-grid-item img {
        max-width: 100%;
        height: auto;
		overflow:hidden;
		transition: all ease-in-out .3s
      }
      .product-grid-item h3 {
        margin: 0;
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
        color: #333;
      }
	  .product-grid-item img:hover {
        transform: scale(1.05)
      }
	  .start{
		border:none;
		background:white;
		box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
		font-size:50px;
		border-radius:20px;
		transform: skew(20deg);
		color:purple;
		position:absolute;
		top:59%;
		left:63%;
		transition:all .3s ease-in-out;
		cursor:pointer;
	  }
	  .start:hover{
		background:purple;
		color:white;
		transform: skew(0deg)
		
	  }
	  @media screen and (max-width:1740px){
		.start{
			top:55%;
			left:60%;
		}
	  }
	  @media screen and (max-width:1370px){
		.start{
			font-size:40px;
			top:55%;
			left:60%;
		}
	  }
	  @media screen and (max-width:1210px){
		.start{
			font-size:30px;
			top:55%;
			left:63%;
		}
	  }
	  @media screen and (max-width:950px){
		.start{
			font-size:30px;
			top:53%;
			left:60%;
		}
	  }
	  @media screen and (max-width:500px){
		.start{
			font-size:30px;
			top:53%;
			left:25%;
		}
		.cover-image {
			background-position: right
		}
	  }
	  
    </style>
  </head>
  <body>
    <div class="brand">
      <div class = "brand-container">
        <img src="{%static 'imgs/infinitfolio.png'%}" width="50" height="50" style="border-radius:10px;margin:10px;">
        <h2>INFINITFOLIO</h2>
      </div>
    </div>
    <div class="cover-image">
		<a href="/create"><button class="start"> Get started </button></a>
    </div>
    <div class="product-grid">
      <a href="https://cszido.github.io/worldlang/">
        <div class="product-grid-item">
          <img src="{%static 'imgs/world.gif'%}" alt="Product 1">
          <h3>WorldLang</h3>
        </div>
      </a>
      <a href="/blogs/create">
        <div class="product-grid-item">
          <img src="{%static 'imgs/blog.jpg'%}" alt="Product 2">
          <h3>Create Blog</h3>
        </div>
      </a>
      <a href="https://cszido.github.io/AlienLang">
        <div class="product-grid-item">
          <img src="{%static 'imgs/alien.gif' %}" alt="Product 3">
          <h3>AlienLang</h3>
        </div>
      </a>
      <a href="/stores/create">
        <div class="product-grid-item">
          <img src="{%static 'imgs/e-shop.jpg'%}" alt="Product 4">
          <h3>Create E-shop</h3>
        </div>
      </a>
      <a href="/mymenus">
        <div class="product-grid-item">
          <img style="height:210px;width:100%;" src="{%static 'imgs/menu.jpg'%}" alt="Product 5">
          <h3>Menu</h3>
        </div>
      </a>
    </div>
  </body>
</html>
