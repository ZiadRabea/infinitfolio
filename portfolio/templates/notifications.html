<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinitfolio | Notifications</title>
    <style>
        :root {
            --background-color: #0c0c0c;
            --card-color: #1c1c1c;
            --text-color: #ffffff;
            --highlight-color: #a0a0a0;
        }
        a{
            color:none;
            text-decoration: none;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin: 20px 0;
        }

        .notifications {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
        }

        .notification {
            background-color: var(--card-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .notification:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        .notification h2 {
            margin: 0 0 10px;
            font-size: 1.2rem;
        }

        .notification p {
            margin: 0;
            color: var(--highlight-color);
        }

        @media (max-width: 768px) {
            .notifications {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1>Notifications</h1>
    <div class="notifications">
        {%for notification in user.profile.website.receiver.all%}
        <a style="color:white" href="{{notification.url}}"><div class="notification">
            <h2>{{notification.sender.full_name}}</h2>
            <p>{{notification.content}}</p>
        </div></a>
        {%endfor%}
    </div>
</body>
</html>
