<!DOCTYPE html>
<html>
<head>
    <title>Create Menu Item</title>
    <style>
        /* CSS styles for the create menu item page */
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-top: 40px;
        }

        .form-container {
            margin: 20px auto;
            max-width: 500px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.3);
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .submit-button {
            display: block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4caf50;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .submit-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Create Menu Item</h1>

    <div class="form-container">
        <form id="create-form" method="post" enctype="multipart/form-data">
            {%csrf_token%}
            <div class="form-group">
                <label for="product">Product:</label>
                {{form.product}}
            </div>

            <div class="form-group">
                <label for="price">Price:</label>
                {{form.price}}
            </div>

            <button type="submit" class="submit-button">Create</button>
        </form>
    </div>
</body>
</html>
