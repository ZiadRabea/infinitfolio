{%if user.is_superuser%}
{%load static%}
<!DOCTYPE html>
<html>
<head>
    <title>Infinitfolio | Review Stores</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="{%static 'imgs/infinitfolio.png'%}" type="image/png">
    <style>
		/* Reset default styles */
		body, figure, h1, h2, h3, p, ul {
			margin: 0;
			padding: 0;
		}

		body {
			font-family: Arial, sans-serif;
			font-size: 16px;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
			padding: 20px;
		}

		header {
			background-color: #333;
			color: #fff;
			padding: 20px;
		}

		header h1 {
			font-size: 24px;
		}

		nav ul {
			list-style-type: none;
		}

		nav ul li {
			display: inline-block;
			margin-right: 20px;
		}

		nav ul li a {
			color: #fff;
			text-decoration: none;
		}

		section {
			padding: 40px 0;
		}

		section h2 {
			font-size: 24px;
			margin-bottom: 20px;
		}

		.product-list {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
			grid-gap: 20px;
		}

		.product {
			background-color: #f7f7f7;
			padding: 20px;
		}

		.product img {
			max-width: 100%;
			height: 200px;
			width: auto;
			display:block;
			margin:0 auto
		}

		.product h3 {
			font-size: 18px;
			margin-top: 10px;
			margin-bottom: 5px;
		}

		.product p {
			font-size: 14px;
			color: #888;
			margin-bottom: 10px;
		}

		.btn {
			display: inline-block;
			padding: 10px 20px;
			background-color: #333;
			color: #fff;
			text-decoration: none;
			font-size: 16px;
			margin-top: 10px;
		}

		.btn:hover {
			background-color: #555;
		}

		form label, form input, form textarea {
			display: block;
			margin-bottom: 10px;
			width: 100%;
		}

		form input, form textarea {
			padding: 10px;
		}

		footer {
			color: #fff;
			text-align: center;
			padding: 10px;
			background:#3333339e;
			position:fixed;
			bottom:0;
			left:0;
			width:100%;
		}


	</style>
</head>
<body>
    <section id="products">
        <div class="container">
            <h2 style="text-align:center;background:#3333339e; color:white;">New Stores</h2>
            <div class="product-list">
                {%for store in stores%}
                    <div class="product">
                        <img src="{%static 'imgs/4.jpg'%}" alt="Product 1" height="200px">
                        <h3>{{store.name}}</h3>
                        <p>{{store.description}}.</p>
                        <a href="/stores/{{store.name}}" class="btn">View Store</a>
                    </div>
                {%endfor%}
            </div>
        </div>
    </section>
</body>
</html>
{%endif%}
